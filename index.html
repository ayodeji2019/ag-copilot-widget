<script>
(function () {

  var MINT        = "#4DFFC4";
  var MODEL       = "claude-sonnet-4-6";

  var PROXY_URL   = "https://ag-copilot-proxy.akinadeayodeji5.workers.dev";

  var isOpen    = false;
  var sopStatus = "loading";
  var cachedSys = null;

  /* ── Inject CSS ── */
  var S = document.createElement("style");

    "@keyframes ag-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}",

    "#ag-win{position:fixed;bottom:100px;right:28px;width:380px;height:560px;display:flex;flex-direction:column;background:#0a0a0a;border:0.5px solid #1e1e1e;border-radius:16px;overflow:hidden;z-index:99998;box-shadow:0 16px 64px rgba(0,0,0,0.6);font-family:Inter,system-ui,sans-serif;animation:ag-up .25s ease;}",

    "#ag-line{height:2px;background:linear-gradient(90deg,"+MINT+","+MINT+"88,transparent);flex-shrink:0;}",

    "#ag-body::-webkit-scrollbar{width:3px;}",
    "#ag-body::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px;}",
    "#ag-win.light #ag-body::-webkit-scrollbar-thumb{background:#ccc;}",
    "#ag-footer{padding:8px 10px 12px;background:#111;border-top:0.5px solid #1e1e1e;flex-shrink:0;}",
    "#ag-win.light #ag-footer{background:#fff;border-top-color:#e0e0e0;}",
    "#ag-img-preview{display:none;padding:6px 4px 4px;position:relative;width:fit-content;}",
    "#ag-img-preview img{width:64px;height:64px;object-fit:cover;border-radius:7px;border:1px solid "+MINT+"44;display:block;}",
    "#ag-img-remove{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:#e05555;border:none;cursor:pointer;color:#fff;font-size:10px;line-height:16px;text-align:center;padding:0;}",
    "#ag-row{display:flex;gap:6px;align-items:flex-end;background:#0f0f0f;border:0.5px solid #2a2a2a;border-radius:10px;padding:6px 6px 6px 8px;transition:border-color .2s;}",
    "#ag-win.light #ag-row{background:#f7f7f7;border-color:#ccc;}",
    "#ag-img-btn{width:26px;height:26px;border-radius:7px;border:1px solid #2a2a2a;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#555;transition:all .15s;flex-shrink:0;font-size:13px;}",
    "#ag-img-btn:hover{border-color:"+MINT+"88;color:"+MINT+";}",
    "#ag-ta{resize:none;outline:none;border:none;background:transparent;font-size:13px;color:#eee;line-height:1.6;min-height:20px;max-height:90px;overflow-y:auto;flex:1;font-family:inherit;}",
    "#ag-win.light #ag-ta{color:#111;}",
    "#ag-send{width:30px;height:30px;border-radius:8px;border:1px solid #2a2a2a;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:#3a3a3a;transition:all .15s;flex-shrink:0;}",
    "#ag-send.on{border-color:"+MINT+"88;background:rgba(77,255,196,0.1);color:"+MINT+";}",
    "#ag-hint{font-size:10px;color:#3a3a3a;text-align:center;margin-top:4px;letter-spacing:.03em;}",
    "#ag-win.light #ag-hint{color:#bbb;}",
    ".ag-msg{display:flex;gap:8px;margin-bottom:14px;align-items:flex-start;}",
    ".ag-msg.u{flex-direction:row-reverse;}",
    ".ag-bbl{max-width:78%;padding:9px 12px;font-size:13px;line-height:1.65;word-break:break-word;}",
    ".ag-bbl.u{border-radius:13px 3px 13px 13px;background:rgba(77,255,196,0.08);border:0.5px solid "+MINT+"44;color:"+MINT+";}",
    ".ag-bbl.b{border-radius:3px 13px 13px 13px;background:#161616;border:0.5px solid #2a2a2a;color:#d4d4d4;}",
    "#ag-win.light .ag-bbl.u{background:#e6fdf5;border-color:#a0e8cc;color:#0a5a38;}",
    "#ag-win.light .ag-bbl.b{background:#fff;border-color:#e0e0e0;color:#1a1a1a;}",
    ".ag-av{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;}",
    ".ag-av.u{background:#1a2a24;border:1.5px solid "+MINT+"55;color:"+MINT+";}",
    ".ag-av.b{background:#0d1a14;border:1.5px solid "+MINT+"66;}",
    "#ag-win.light .ag-av.u{background:#d0f5e8;}",
    "#ag-win.light .ag-av.b{background:#e6fdf5;}",
    ".ag-sugs{display:grid;grid-template-columns:1fr 1fr;gap:6px;width:100%;}",
    ".ag-sb{text-align:left;padding:9px 10px;cursor:pointer;font-size:11px;background:#0f0f0f;border:0.5px solid #1e1e1e;border-radius:8px;color:#666;line-height:1.5;transition:all .15s;font-family:inherit;}",
    ".ag-sb:hover{border-color:"+MINT+"55;color:"+MINT+";background:rgba(77,255,196,0.06);}",
    "#ag-win.light .ag-sb{background:#f7f7f7;border-color:#e0e0e0;color:#888;}",
    ".ag-cb{background:transparent;border:none;cursor:pointer;color:#666;font-size:13px;padding:3px 5px;border-radius:4px;line-height:1;transition:color .15s;}",
    ".ag-cb:hover{color:"+MINT+";}",
    ".ag-dots{display:flex;gap:4px;align-items:center;padding:2px 0;}",
    ".ag-dot{width:5px;height:5px;border-radius:50%;background:"+MINT+";animation:ag-dot 1.3s infinite ease-in-out;}",
    ".ag-msg-img{width:160px;height:110px;object-fit:cover;border-radius:8px;border:0.5px solid "+MINT+"44;display:block;margin-bottom:6px;}",
    "table.agt{width:100%;border-collapse:collapse;font-size:12px;margin:7px 0;display:block;overflow-x:auto;}",
    "table.agt th{padding:5px 9px;text-align:left;background:#0d1a14;border:0.5px solid #2a2a2a;color:"+MINT+";font-size:11px;white-space:nowrap;}",
    "table.agt td{padding:5px 9px;border:0.5px solid #2a2a2a;color:#d4d4d4;line-height:1.5;vertical-align:top;}",
    "table.agt tr:nth-child(even) td{background:#111;}",
    "#ag-win.light table.agt th{background:#f0fdf8;border-color:#e0e0e0;}",
    "#ag-win.light table.agt td{border-color:#e0e0e0;color:#1a1a1a;}",
    "#ag-win.light table.agt tr:nth-child(even) td{background:#fafafa;}"
  ].join("");
  document.head.appendChild(S);

  /* ── SVG Logo ── */
  function logo(sz) {
    sz = sz || 28;
    return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 200 200" fill="none">'
      +'<path d="M100 14L30 46V104C30 145 60 178 100 190C140 178 170 145 170 104V46L100 14Z" stroke="'+MINT+'" stroke-width="8" fill="none" stroke-linejoin="round"/>'
      +'<path d="M100 38L52 62V100C52 130 72 155 100 165C128 155 148 130 148 100V62L100 38Z" stroke="'+MINT+'" stroke-width="5" fill="none" stroke-linejoin="round" opacity="0.5"/>'
      +'<circle cx="100" cy="16" r="5" fill="'+MINT+'"/>'
      +'<path d="M72 90L86 76L100 90L114 76L128 90" stroke="'+MINT+'" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>'
      +'<path d="M72 108L86 94L100 108L114 94L128 108" stroke="'+MINT+'" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>'
      +'<path d="M84 122L100 138L116 122" stroke="'+MINT+'" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>'
      +'</svg>';
  }

  /* ── Markdown ── */
  function inlineM(s) {
    return s
      .replace(/\*\*(.+?)\*\*/g, '<strong style="font-weight:600;color:'+MINT+'">$1</strong>')
      .replace(/`(.+?)`/g, '<code style="font-family:monospace;font-size:11px;background:rgba(77,255,196,0.09);color:'+MINT+';padding:1px 4px;border-radius:3px;">$1</code>');
  }

  function renderMD(text) {
    var lines = text.split("\n"), out = "", i = 0;
    while (i < lines.length) {
      var l = lines[i];
      if (l.startsWith("## "))  { out += '<p style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:'+MINT+';margin:13px 0 3px;opacity:.9;">'+l.slice(3)+'</p>'; i++; continue; }
      if (l.startsWith("### ")) { out += '<p style="font-size:12px;font-weight:600;color:#eee;margin:9px 0 2px;">'+l.slice(4)+'</p>'; i++; continue; }
      if (/^\s*\|.*\|\s*$/.test(l)) {
        var rows = [];
        while (i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])) { rows.push(lines[i]); i++; }
        var isSep  = function(r) { return /^\s*\|[\s\-|:]+\|\s*$/.test(r); };
        var splitR = function(r) { return r.trim().replace(/^\||\|$/g,"").split("|").map(function(c){return c.trim();}); };
        var hdr = null, bdy = [];
        if (rows.length > 1 && isSep(rows[1])) { hdr = splitR(rows[0]); bdy = rows.slice(2).filter(function(r){return !isSep(r);}).map(splitR); }
        else { bdy = rows.filter(function(r){return !isSep(r);}).map(splitR); }
        out += '<table class="agt">';
        if (hdr) { out += '<thead><tr>'; hdr.forEach(function(c){out+='<th>'+inlineM(c)+'</th>';}); out += '</tr></thead>'; }
        out += '<tbody>';
        bdy.forEach(function(row){out+='<tr>';row.forEach(function(c){out+='<td>'+inlineM(c)+'</td>';});out+='</tr>';});
        out += '</tbody></table>';
        continue;
      }
      if (/^\d+\. /.test(l)) {
        out += '<ol style="margin:4px 0;padding-left:17px;font-size:13px;">';
        while (i < lines.length && /^\d+\. /.test(lines[i])) { out += '<li style="padding:2px 0;line-height:1.6;">'+inlineM(lines[i].replace(/^\d+\. /,""))+'</li>'; i++; }
        out += '</ol>'; continue;
      }
      if (l.startsWith("- ")) {
        out += '<ul style="margin:4px 0;padding-left:15px;font-size:13px;list-style-type:disc;">';
        while (i < lines.length && lines[i].startsWith("- ")) { out += '<li style="padding:2px 0;line-height:1.6;">'+inlineM(lines[i].slice(2))+'</li>'; i++; }
        out += '</ul>'; continue;
      }
      if (l.trim() === "---") { out += '<hr style="border:none;border-top:0.5px solid #2a2a2a;margin:8px 0;"/>'; i++; continue; }
      if (l.trim()) out += '<p style="margin:3px 0;line-height:1.65;font-size:13px;">'+inlineM(l)+'</p>';
      i++;
    }
    return out;
  }

  /* ── Build DOM ── */
  var fab = document.createElement("div");
  fab.id = "ag-fab";
  fab.innerHTML = logo(30)+'<div id="ag-notif"></div><div id="ag-tip">I\'m AdGuardian Copilot! Ask me anything.</div>';

  var win = document.createElement("div");
  win.id = "ag-win";
  win.style.display = "none";
  win.innerHTML = ''
    +'<div id="ag-hdr">'
    +  '<div style="display:flex;align-items:center;gap:8px;">'
    +    '<div style="width:28px;height:28px;border-radius:50%;background:#0d1a14;border:1.5px solid '+MINT+'66;display:flex;align-items:center;justify-content:center;">'+logo(18)+'</div>'
    +    '<div>'
    +      '<div style="font-weight:700;font-size:13px;letter-spacing:.04em;color:#fff;">AD<span style="color:'+MINT+'">GUARDIANS</span></div>'
    +      '<div style="display:flex;align-items:center;gap:4px;margin-top:1px;">'
    +        '<div id="ag-sdot" style="width:6px;height:6px;border-radius:50%;background:#f5a623;animation:ag-spin 1s linear infinite;"></div>'
    +        '<span id="ag-stxt" style="font-size:9px;color:#666;letter-spacing:.06em;text-transform:uppercase;">Loading SOPs...</span>'
    +      '</div>'
    +    '</div>'
    +  '</div>'
    +  '<div style="display:flex;align-items:center;gap:2px;">'
    +    '<button class="ag-cb" id="ag-theme">☀</button>'
    +    '<button class="ag-cb" id="ag-min">─</button>'
    +    '<button class="ag-cb" id="ag-cls">✕</button>'
    +  '</div>'
    +'</div>'
    +'<div id="ag-line"></div>'
    +'<div id="ag-body"></div>'
    +'<div id="ag-footer">'
    +  '<div id="ag-img-preview"><img id="ag-img-thumb" src="" alt=""/><button id="ag-img-remove">✕</button></div>'
    +  '<div id="ag-row">'
    +    '<button id="ag-img-btn" title="Attach image">📎</button>'
    +    '<input id="ag-img-input" type="file" accept="image/jpeg,image/png,image/gif,image/webp" style="display:none;"/>'
    +    '<textarea id="ag-ta" rows="1" placeholder="Loading SOPs..." disabled style="resize:none;outline:none;border:none;background:transparent;font-size:13px;color:#eee;line-height:1.6;min-height:20px;max-height:90px;overflow-y:auto;flex:1;font-family:inherit;"></textarea>'
    +    '<button id="ag-send" class="ag-send" disabled>↑</button>'
    +  '</div>'
    +  '<div id="ag-hint" style="font-size:10px;color:#3a3a3a;text-align:center;margin-top:4px;letter-spacing:.03em;">Enter to send · Shift+Enter for new line · 📎 to attach image</div>'
    +'</div>';

  document.body.appendChild(fab);
  document.body.appendChild(win);

  /* ── Refs ── */
  var body       = document.getElementById("ag-body");
  var ta         = document.getElementById("ag-ta");
  var sBtn       = document.getElementById("ag-send");
  var sdot       = document.getElementById("ag-sdot");
  var stxt       = document.getElementById("ag-stxt");
  var notif      = document.getElementById("ag-notif");
  var imgBtn     = document.getElementById("ag-img-btn");
  var imgInput   = document.getElementById("ag-img-input");
  var imgPreview = document.getElementById("ag-img-preview");
  var imgThumb   = document.getElementById("ag-img-thumb");
  var imgRemove  = document.getElementById("ag-img-remove");

  var SUGGS = [
    "How do I onboard a new client?",
    "WH subscription plans and pricing?",
    "How to process a USDT invoice?",
    "Meta ad account not spending?",
  ];

  /* ── Helpers ── */
  function setReady(src) {
    sopStatus = src;
    sdot.style.animation = "none";
    sdot.style.background = MINT;
    stxt.textContent = src === "cache" ? "COPILOT · CACHED" : "COPILOT · LIVE FROM DRIVE";
    ta.disabled = false;
    ta.placeholder = "Ask a question or attach a screenshot...";
    renderBody();
  }

  function setError(msg) {
    sopStatus = "error";
    sdot.style.animation = "none";
    sdot.style.background = "#e05555";
    stxt.textContent = "LOAD FAILED";
    body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;padding:20px;text-align:center;">'
      +'<p style="font-size:12px;color:#e05555;margin:0;">Failed to load SOPs.<br><span style="color:#666;font-size:11px;">'+(msg||"Please refresh.")+'</span></p>'
      +'<button onclick="window.location.reload()" style="font-size:11px;padding:5px 14px;cursor:pointer;background:transparent;border:1px solid #e05555;border-radius:8px;color:#e05555;font-family:inherit;">Retry</button>'
      +'</div>';
  }

  function setSend() {
    var ready = (ta.value.trim() || pendingImg) && !isBusy && sopStatus !== "loading" && sopStatus !== "error";
    if (ready) { sBtn.classList.add("on"); sBtn.disabled = false; }
    else        { sBtn.classList.remove("on"); sBtn.disabled = true; }
  }

  function clearImage() {
    pendingImg = null;
    imgPreview.style.display = "none";
    imgThumb.src = "";
    imgInput.value = "";
    setSend();
  }

  /* ── Render messages ── */
  function renderBody() {
    if (messages.length === 0) {
      body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;text-align:center;">'
        +'<div>'
        +  '<div style="display:inline-flex;align-items:center;justify-content:center;width:54px;height:54px;border-radius:50%;background:#0d1a14;border:1.5px solid '+MINT+'44;margin-bottom:10px;">'+logo(32)+'</div>'
        +  '<div style="font-weight:700;font-size:15px;color:#fff;margin-bottom:4px;">AD<span style="color:'+MINT+'">GUARDIANS</span> <span style="font-weight:400;color:#666;">Copilot</span></div>'
        +  '<div style="font-size:12px;color:#666;max-width:270px;line-height:1.6;margin:0 auto;">Ask anything or attach a screenshot for SOP-based advice.</div>'
        +'</div>'
        +'<div class="ag-sugs">'
        +SUGGS.map(function(s){return '<button class="ag-sb" onclick="window._agSend(\''+s.replace(/'/g,"\\'")+'\')">'+s+'</button>';}).join("")
        +'</div></div>';
      return;
    }
    var html = "";
    messages.forEach(function(m) {
      var u  = m.role === "user";
      var av = '<div class="ag-av '+(u?"u":"b")+'">'+(u?"Y":logo(16))+'</div>';
      var imgHtml = (u && m.imageUrl) ? '<img class="ag-msg-img" src="'+m.imageUrl+'" alt="screenshot"/>' : "";
      var txt = u ? (m.displayText || "") : m.content;
      var bubble = u
        ? (imgHtml + (txt ? '<div>'+txt+'</div>' : ""))
        : (m.content ? renderMD(m.content) : '<div class="ag-dots"><div class="ag-dot" style="animation-delay:0s"></div><div class="ag-dot" style="animation-delay:.18s"></div><div class="ag-dot" style="animation-delay:.36s"></div></div>');
      var bb = '<div class="ag-bbl '+(u?"u":"b")+'">'+bubble+'</div>';
      html += '<div class="ag-msg '+(u?"u":"b")+'">'+(u?bb+av:av+bb)+'</div>';
    });
    body.innerHTML = html;
    body.scrollTop = body.scrollHeight;
  }

  window._agSend = function(t) { doSend(t); };

  /* ── Load SOPs ── */
  function loadSOPs() {
    try { var h = sessionStorage.getItem(SESSION_KEY); if (h) { cachedSys = h; setReady("cache"); return; } } catch(e) {}
    body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;">'
      +'<div style="width:32px;height:32px;border-radius:50%;border:2px solid '+MINT+'44;border-top-color:'+MINT+';animation:ag-spin .9s linear infinite;"></div>'
      +'<p style="font-size:12px;color:#666;margin:0;">Loading SOPs from Google Drive...</p>'
      +'<p style="font-size:10px;color:#444;margin:0;">Cached for this session once done</p>'
      +'</div>';
    fetch(PROXY_URL, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({action:"load_sop"})
    })
    .then(function(r){ if(!r.ok) return r.text().then(function(t){throw new Error("HTTP "+r.status+": "+t);}); return r.json(); })
    .then(function(d){
      if (!d.system) throw new Error("No system prompt returned");
      cachedSys = d.system;
      try { sessionStorage.setItem(SESSION_KEY, cachedSys); } catch(e) {}
      setReady("drive");
    })
    .catch(function(e){ console.error("AG Copilot load error:", e); setError(e.message); });
  }

  /* ── Send ── */
  function doSend(txt) {
    var q = (txt || ta.value).trim();
    if ((!q && !pendingImg) || isBusy || sopStatus === "loading" || sopStatus === "error") return;

    var snap = pendingImg;
    var imgUrl = snap ? snap.previewUrl : null;
    var apiContent;

    if (snap) {
      apiContent = [
        {type:"image", source:{type:"base64", media_type:snap.mediaType, data:snap.base64}},
        {type:"text",  text: q || "What do you see in this screenshot? Based on our SOPs, what should we advise the client?"}
      ];
    } else {
      apiContent = q;
    }

    ta.value = ""; ta.style.height = "auto";
    clearImage();

    messages.push({role:"user", content:apiContent, imageUrl:imgUrl, displayText:q});
    var ai = messages.length;
    messages.push({role:"assistant", content:""});
    isBusy = true;
    renderBody();

    fetch(PROXY_URL, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        action:   "chat",
        stream:   true,
        system:   cachedSys,
        messages: messages.slice(0,-1).map(function(m){return {role:m.role, content:m.content};})
      })
    })
    .then(function(r){
      if (!r.ok) throw new Error("HTTP "+r.status);
      var reader = r.body.getReader(), dec = new TextDecoder(), acc = "";
      function pump(){
        return reader.read().then(function(res){
          if (res.done) { isBusy=false; setSend(); return; }
          dec.decode(res.value,{stream:true}).split("\n").forEach(function(line){
            if (!line.startsWith("data: ")) return;
            var d = line.slice(6).trim();
            if (d==="[DONE]") return;
            try { var p=JSON.parse(d); var t=p&&p.delta&&p.delta.text?p.delta.text:""; if(t){acc+=t;messages[ai].content=acc;renderBody();} } catch(e){}
          });
          return pump();
        });
      }
      return pump();
    })
    .catch(function(){
      messages[ai].content = "Connection error. Please try again.";
      isBusy=false; setSend(); renderBody();
    });
  }

  /* ── Open / Close / Minimize ── */
  function openWin()  { isOpen=true;  win.style.display="flex"; notif.style.display="none"; if(sopStatus==="loading"&&!cachedSys) loadSOPs(); }
  function closeWin() { isOpen=false; win.style.display="none"; }
  function miniWin()  { isOpen=false; win.style.display="none"; notif.style.display="block"; }

  /* ── Image events ── */
  imgBtn.addEventListener("click", function(){ imgInput.click(); });
  imgRemove.addEventListener("click", clearImage);
  imgInput.addEventListener("change", function(){
    var file = imgInput.files[0];
    if (!file) return;
    if (file.size > 5*1024*1024) { alert("Image must be under 5MB."); return; }
    var reader = new FileReader();
    reader.onload = function(e){
      var dataUrl = e.target.result;
      pendingImg = {base64:dataUrl.split(",")[1], mediaType:file.type||"image/jpeg", previewUrl:dataUrl};
      imgThumb.src = dataUrl;
      imgPreview.style.display = "block";
      setSend();
    };
    reader.readAsDataURL(file);
  });

  /* ── Other events ── */
  fab.addEventListener("click", function(){ isOpen ? closeWin() : openWin(); });
  document.getElementById("ag-cls").addEventListener("click",   closeWin);
  document.getElementById("ag-min").addEventListener("click",   miniWin);
  document.getElementById("ag-theme").addEventListener("click", function(){
    dark=!dark; win.classList.toggle("light",!dark);
    document.getElementById("ag-theme").textContent = dark?"☀":"🌙";
  });
  sBtn.addEventListener("click", function(){ doSend(); });
  ta.addEventListener("input", function(){
    ta.style.height="auto"; ta.style.height=Math.min(ta.scrollHeight,90)+"px"; setSend();
  });
  ta.addEventListener("keydown", function(e){
    if (e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); doSend(); }
  });
  ta.addEventListener("focus", function(){ document.getElementById("ag-row").style.borderColor=MINT+"55"; });
  ta.addEventListener("blur",  function(){ document.getElementById("ag-row").style.borderColor=dark?"#2a2a2a":"#ccc"; });

  renderBody();

}());
</script>
